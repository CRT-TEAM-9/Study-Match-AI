    <script src="/config.js"></script>

    <!-- Firebase SDK Integration -->
    <script src="/firebase-config.js"></script>

      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";

      const analytics = getAnalytics(app);
    </script>
    <!-- Load Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Load Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        // Inline theme manager to prevent white flash
        function applyTheme() {
            const theme = localStorage.getItem("theme") || "system";
            let isDark = false;
            let themeLabel = "";
            let themeIcon = "desktop_windows";
            
            if (theme === "dark") {
                isDark = true;
                themeLabel = "Dark";
                themeIcon = "dark_mode";
            } else if (theme === "light") {
                isDark = false;
                themeLabel = "Light";
                themeIcon = "light_mode";
            } else {
                isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                themeLabel = "System (" + (isDark ? "Dark" : "Light") + ")";
                themeIcon = "desktop_windows";
            }
            
            if (isDark) {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
            
            const updateUI = () => {
                const icon = document.getElementById("theme-icon");
                const text = document.getElementById("theme-text");
                if (icon) icon.textContent = themeIcon;
                if (text) text.textContent = themeLabel;
            };
            
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", updateUI);
            } else {
                updateUI();
            }
        }
        function toggleTheme() {
            const theme = localStorage.getItem("theme") || "system";
            let nextTheme = "light";
            if (theme === "system") {
                nextTheme = "light";
            } else if (theme === "light") {
                nextTheme = "dark";
            } else if (theme === "dark") {
                nextTheme = "system";
            }
            localStorage.setItem("theme", nextTheme);
            applyTheme();
        }
        
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
            if ((localStorage.getItem("theme") || "system") === "system") {
                applyTheme();
            }
        });
        
        applyTheme();
    </script>
    
    <script>
        tailwind.config = {

    </script>
