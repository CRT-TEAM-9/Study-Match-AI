    <script>
        // Page restriction: Redirect logged in users away from login page
        if (localStorage.getItem("logged_in_user")) {
            window.location.href = "/dashboard.html";
        }
        
        // Inline theme manager to prevent white flash
        function applyTheme() {
            const theme = localStorage.getItem("theme") || "system";
            let isDark = false;
            let themeLabel = "";
            let themeIcon = "desktop_windows";
            
            if (theme === "dark") {
                isDark = true;
                themeLabel = "Dark";
                themeIcon = "dark_mode";
            } else if (theme === "light") {
                isDark = false;
                themeLabel = "Light";
                themeIcon = "light_mode";
            } else {
                isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                themeLabel = "System (" + (isDark ? "Dark" : "Light") + ")";
                themeIcon = "desktop_windows";
            }
            
            if (isDark) {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
            
            const updateUI = () => {
                const icon = document.getElementById("theme-icon");
                const text = document.getElementById("theme-text");
                if (icon) icon.textContent = themeIcon;
                if (text) text.textContent = themeLabel;
            };
            
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", updateUI);
            } else {
                updateUI();
            }
        }
        function toggleTheme() {
            const theme = localStorage.getItem("theme") || "system";
            let nextTheme = "light";
            if (theme === "system") {
                nextTheme = "light";
            } else if (theme === "light") {
                nextTheme = "dark";
            } else if (theme === "dark") {
                nextTheme = "system";
            }
            localStorage.setItem("theme", nextTheme);
            applyTheme();
        }
        
        // Listen for system theme changes
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
            if ((localStorage.getItem("theme") || "system") === "system") {
                applyTheme();
            }
        });
        
        applyTheme();
    </script>

        function loginAs(student) {

        async function handleLoginSuccess(email, displayName, photoURL) {
            const errorBox = document.getElementById("error-box");
            try {
                const res = await fetch(window.getApiUrl("/api/students"));
                if (res.ok) {
                    const students = await res.json();
                    const found = students.find(s => s.email && s.email.toLowerCase() === email.toLowerCase());
                    
                    if (found) {
                        loginAs(found);
                    } else {
                        // Profile does not exist yet. Cache authentication info and redirect to registration.
                        const tempUser = {
                            name: displayName || "",
                            email: email,
                            profile_pic: photoURL || ""
                        };
                        sessionStorage.setItem("temp_auth_user", JSON.stringify(tempUser));

                        errorBox.innerHTML = `👋 Authenticated as <strong>${email}</strong>!<br>No academic study profile found yet.<br>Redirecting to complete your registration details...`;
                        errorBox.className = "p-md text-blue-700 bg-blue-50 border border-blue-300 rounded-lg text-sm text-left mb-md";
                        
                        setTimeout(() => {
                            window.location.href = "/register.html";
                        }, 2500);
                    }
                }
            } catch (err) {
                console.error("Database check error", err);
                errorBox.textContent = "⚠️ Successfully authenticated, but database check failed. Server might be offline.";
                errorBox.className = "p-md text-red-700 bg-red-50 border border-red-300 rounded-lg text-sm text-left mb-md";
            }
        }

                contentSecure.classList.remove("hidden");
                contentDemo.classList.add("hidden");
                errorBox.classList.add("hidden");
            });

            tabDemo.addEventListener("click", () => {
                tabDemo.className = "w-1/2 pb-2 border-b-2 border-primary font-bold text-sm text-primary transition-all";
                tabSecure.className = "w-1/2 pb-2 border-b-2 border-transparent text-gray-500 font-semibold text-sm hover:text-primary transition-all";
                contentDemo.classList.remove("hidden");
                contentSecure.classList.add("hidden");
                errorBox.classList.add("hidden");
            });

            // Google sign in trigger
            googleBtn.addEventListener("click", async () => {
                errorBox.classList.add("hidden");
                try {
                    const result = await signInWithPopup(auth, provider);
                    await handleLoginSuccess(result.user.email, result.user.displayName, result.user.photoURL);
                } catch (err) {
                    console.error("Google Auth error", err);
                    errorBox.textContent = `⚠️ Google Sign-In failed: ${err.message}`;
                    errorBox.className = "p-md text-red-700 bg-red-50 border border-red-300 rounded-lg text-sm text-left mb-md";
                }
            });

            // Email Form sign in trigger
            emailForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                errorBox.classList.add("hidden");
                const email = document.getElementById("login-email").value.trim();
                const password = document.getElementById("login-password").value;

                try {
                    const credentials = await signInWithEmailAndPassword(auth, email, password);
                    await handleLoginSuccess(credentials.user.email, credentials.user.displayName || "", credentials.user.photoURL || "");
                } catch (err) {
                    console.error("Email Auth error", err);
                    errorBox.textContent = `⚠️ Authentication failed: ${err.message}`;
                    errorBox.className = "p-md text-red-700 bg-red-50 border border-red-300 rounded-lg text-sm text-left mb-md";
                }
            });

            // Load all students for the quick logins
            try {
                const res = await fetch(window.getApiUrl("/api/students"));
                if (res.ok) {
                    const students = await res.json();
                    if (students.length === 0) {
                        demoContainer.innerHTML = `<p class="text-sm text-gray-500 text-left">No registered profiles in database.</p>`;
                    } else {
                        demoContainer.innerHTML = "";
                        students.forEach(s => {
                            const name = s.name;
                            const initials = name.split(" ").map(w => w[0]).join("").substring(0, 2).toUpperCase();
                            let avatarHTML = `
                                <div class="w-8 h-8 rounded-full bg-[#d6e3ff] text-[#001b3d] flex items-center justify-center text-xs font-bold flex-shrink-0">
                                    ${initials}
                                </div>`;
                            if (s.profile_pic) {
                                avatarHTML = `
                                    <div class="w-8 h-8 rounded-full border border-outline-variant overflow-hidden flex-shrink-0">
                                        <img src="${s.profile_pic}" class="w-full h-full object-cover" alt="${name}" />
                                    </div>`;
                            }
                            
                            const link = document.createElement("button");
                            link.type = "button";
                            link.className = "w-full flex items-center gap-sm p-sm bg-surface-variant/30 hover:bg-surface-variant/70 rounded-xl border border-outline-variant/30 text-on-surface hover:text-primary transition-all text-left";
                            link.innerHTML = `
                                ${avatarHTML}
                                <div class="overflow-hidden">
                                    <p class="text-sm font-bold truncate leading-tight">${s.name}</p>
                                    <p class="text-xs text-on-surface-variant truncate">${s.year} — ${s.branch}</p>
                                </div>
                            `;
                            link.addEventListener("click", () => loginAs(s));
                            demoContainer.appendChild(link);
                        });
                    }
                }
            } catch (err) {
                console.error("Failed to fetch students", err);
                demoContainer.innerHTML = `<p class="text-sm text-red-500 text-left">Failed to connect to backend database.</p>`;
            }

            // Handle manual ID or name login
            manualForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                errorBox.classList.add("hidden");
                const inputVal = document.getElementById("student_id").value.trim();
                
                try {
                    const res = await fetch(window.getApiUrl("/api/students"));
                    if (res.ok) {
                        const students = await res.json();
                        const found = students.find(s => 
                            s.student_id.toLowerCase() === inputVal.toLowerCase() ||
                            s.name.toLowerCase() === inputVal.toLowerCase()
                        );
                        
                        if (found) {
                            loginAs(found);
                        } else {
                            errorBox.textContent = `⚠️ No student found with ID or name "${inputVal}". Please verify or select a quick profile below.`;
                            errorBox.className = "p-md text-red-700 bg-red-50 border border-red-300 rounded-lg text-sm text-left mb-md";
                        }
                    }
                } catch (err) {
                    console.error("Manual login error", err);
                    errorBox.textContent = "⚠️ Failed to verify login. Server might be offline.";
                    errorBox.className = "p-md text-red-700 bg-red-50 border border-red-300 rounded-lg text-sm text-left mb-md";
                }
            });
        });
    </script>
</body>
</html>
