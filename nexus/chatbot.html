    <script>
        // Inline theme manager to prevent white flash
        function applyTheme() {
            const theme = localStorage.getItem("theme") || "system";
            let isDark = false;
            let themeLabel = "";
            let themeIcon = "desktop_windows";
            
            if (theme === "dark") {
                isDark = true;
                themeLabel = "Dark";
                themeIcon = "dark_mode";
            } else if (theme === "light") {
                isDark = false;
                themeLabel = "Light";
                themeIcon = "light_mode";
            } else {
                isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                themeLabel = "System (" + (isDark ? "Dark" : "Light") + ")";
                themeIcon = "desktop_windows";
            }
            
            if (isDark) {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
            
            const updateUI = () => {
                const icon = document.getElementById("theme-icon");
                const text = document.getElementById("theme-text");
                if (icon) icon.textContent = themeIcon;
                if (text) text.textContent = themeLabel;
            };
            
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", updateUI);
            } else {
                updateUI();
            }
        }
        function toggleTheme() {
            const theme = localStorage.getItem("theme") || "system";
            let nextTheme = "light";
            if (theme === "system") {
                nextTheme = "light";
            } else if (theme === "light") {
                nextTheme = "dark";
            } else if (theme === "dark") {
                nextTheme = "system";
            }
            localStorage.setItem("theme", nextTheme);
            applyTheme();
        }
        
        // Listen for system theme changes
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
            if ((localStorage.getItem("theme") || "system") === "system") {
                applyTheme();
            }
        });
        
        applyTheme();
    </script>

                    content: `👋 Hello! I am your conversational Nexus registration assistant. I will guide you step-by-step to create your study profile.<br><br>Let's get started!<br><br>**Question 1: What is your name?**`

        function renderMessage(msg) {
            const thread = document.getElementById("chat-thread-container");
            const userAvatar = getAvatar(loggedInUser.name, loggedInUser.profile_pic);
            
            let htmlContent = msg.content;
            // Standard markdown cleanups
            htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            htmlContent = htmlContent.replace(/_(.*?)_/g, '<em>$1</em>');
            htmlContent = htmlContent.replace(/\n/g, '<br>');

            const msgDiv = document.createElement("div");
            if (msg.role === "user") {
                msgDiv.className = "flex gap-md w-full max-w-3xl self-end flex-row-reverse text-right items-start";

                        <p class="text-sm font-semibold">${htmlContent}</p>
                    </div>
                `;
            } else {
                msgDiv.className = "flex gap-md w-full max-w-3xl self-start text-left items-start";
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded bg-surface-container-high flex items-center justify-center flex-shrink-0 shadow-sm text-primary">
                        <span class="material-symbols-outlined text-[18px]">smart_toy</span>
                    </div>
                    <div class="bg-surface-container p-md rounded-xl rounded-tl-none border border-outline-variant shadow-[0px_4px_12px_rgba(0,33,71,0.02)] inline-block">
                        <p class="text-sm font-medium text-gray-800">${htmlContent}</p>
                    </div>
                `;
            }

            thread.appendChild(msgDiv);
            thread.scrollTop = thread.scrollHeight;
        }

        function renderMatchingEngineButton() {
            const thread = document.getElementById("chat-thread-container");
            const btnDiv = document.createElement("div");
            btnDiv.className = "w-full max-w-lg self-start pl-10 mt-sm";
            btnDiv.innerHTML = `
                <button onclick="runMatchingEngine()" class="w-full bg-secondary text-on-secondary hover:opacity-95 py-sm rounded-lg font-semibold text-sm shadow-md flex justify-center items-center gap-xs h-10 font-bold">
                    🔍 Run Matching Engine Now
                </button>
            `;
            thread.appendChild(btnDiv);
            thread.scrollTop = thread.scrollHeight;
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const inputEl = document.getElementById("chat-text-input");
            const msgText = inputEl.value.trim();
            if (!msgText) return;

            inputEl.value = "";

            const userMsg = { role: "user", content: msgText };
            chatHistory.push(userMsg);
            renderMessage(userMsg);

            if (activeObjective === "matchmaker") {
                await sendMatchmakerChat(msgText);
            } else {
                await sendRegistrationChat(msgText);
            }
        }

        async function runMatchingEngine() {
            // Log user trigger
            const userMsg = { role: "user", content: "find matches" };
            chatHistory.push(userMsg);
            renderMessage(userMsg);
            await sendMatchmakerChat("match");
        }

        async function sendMatchmakerChat(msgText) {
            try {
                const res = await fetch(window.getApiUrl("/api/chat"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        student_id: loggedInUser.student_id,
                        message: msgText,
                        history: chatHistory.map(m => ({ role: m.role, content: m.content }))
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    const botMsg = { role: "assistant", content: data.response };
                    chatHistory.push(botMsg);
                    renderMessage(botMsg);

                    // Render Matches and Groups if available
                    if (data.matches && data.matches.length > 0) {
                        data.matches.forEach(m => renderBentoMatchCard(m));
                    }
                    if (data.groups && data.groups.length > 0) {
                        data.groups.forEach(g => renderStudyGroupCard(g));
                    }
                    
                    // Always show match engine trigger again
                    renderMatchingEngineButton();
                }
            } catch (err) {
                console.error("Matchmaker chat error", err);
                renderMessage({ role: "assistant", content: "⚠️ Failed to run matching query. Please verify backend server connectivity." });
            }
        }

        async function sendRegistrationChat(msgText) {
            try {
                const res = await fetch(window.getApiUrl("/api/chat/register-step"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        step: registerStep,
                        message: msgText,
                        profile: registerProfile,
                        history: chatHistory.map(m => ({ role: m.role, content: m.content }))
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    if (data.success) {
                        registerStep = data.step;
                        registerProfile = data.profile;
                        
                        if (data.complete) {
                            const savedProfile = data.profile;
                            
                            // Sync profile to Firestore
                            if (window.db) {
                                try {
                                    const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js");
                                    await setDoc(doc(window.db, "students", savedProfile.student_id), savedProfile);
                                } catch (fsErr) {
                                    console.error("Firestore sync error:", fsErr);
                                }
                            }

                            loggedInUser = savedProfile;
                            localStorage.setItem("logged_in_user", JSON.stringify(savedProfile));
                            
                            const botMsg = { role: "assistant", content: data.response };
                            chatHistory.push(botMsg);
                            renderMessage(botMsg);
                            
                            setTimeout(() => {
                                toggleObjective("matchmaker");
                            }, 4500);
                        } else {
                            const botMsg = { role: "assistant", content: data.prompt };
                            chatHistory.push(botMsg);
                            renderMessage(botMsg);
                        }
                    } else {
                        // Reshow prompt
                        const botMsg = { role: "assistant", content: data.prompt };
                        chatHistory.push(botMsg);
                        renderMessage(botMsg);
                    }
                }
            } catch (err) {
                console.error("Registration Q&A error", err);
                renderMessage({ role: "assistant", content: "⚠️ Failed to process response. Verify server connectivity." });
            }
        }

        function renderBentoMatchCard(match) {
            const thread = document.getElementById("chat-thread-container");
            const partner = match.partner;
            const score = match.overall_score;
            const avatarUrl = getAvatar(partner.name);

            // Compute justification
            const sortedFactors = Object.entries(match.breakdown).sort((a,b) => b[1].weighted - a[1].weighted);
            const bestFactors = sortedFactors.filter(f => f[1].score > 50).map(f => f[0].replace(/_/g, ' ').toUpperCase());
            
            let aiJustification = "";
            if (bestFactors.length > 0) {
                aiJustification = `High compatibility in **${bestFactors.slice(0,2).join(" & ")}**. `;
            }
            aiJustification += `Strong match for **${partner.goal}** using a **${partner.study_style}** style (${partner.communication_preference}).`;
            
            const days = partner.availability_days.join(", ");
            const times = partner.preferred_study_time.join(", ");
            const strongSubjects = partner.subjects_strong_in.join(", ");

            const card = document.createElement("div");
            card.className = "bg-surface-container-lowest border border-outline-variant rounded-xl p-md shadow-md w-full grid grid-cols-1 md:grid-cols-12 gap-md hover:border-secondary transition-all group text-on-surface text-left mt-md max-w-3xl pl-4 pr-4 py-4";
            card.innerHTML = `
                <!-- Left Pane: Identity and Score -->
                <div class="md:col-span-5 flex flex-col gap-sm border-b md:border-b-0 md:border-r border-outline-variant pb-md md:pb-0 md:pr-md">
                    <div class="flex items-center gap-sm mb-sm">
                        <div class="w-12 h-12 rounded-full bg-surface-variant overflow-hidden border border-outline-variant flex-shrink-0">
                            <img alt="${partner.name}" class="w-full h-full object-cover" src="${avatarUrl}"/>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-primary leading-tight">${partner.name}</h3>
                            <span class="text-xs text-on-surface-variant font-semibold text-gray-500">${partner.year} — ${partner.branch}</span>
                        </div>
                    </div>
                    <div class="bg-surface p-sm rounded border border-outline-variant mt-auto">
                        <div class="flex justify-between items-end mb-xs">
                            <span class="text-xs text-on-surface-variant uppercase font-semibold text-gray-500">Compatibility</span>
                            <span class="text-lg font-bold text-secondary leading-none">${score}%</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-secondary rounded-full" style="width: ${score}%"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Right Pane: Details -->
                <div class="md:col-span-7 flex flex-col justify-between gap-sm">
                    <div>
                        <h4 class="text-xs font-bold text-on-surface-variant uppercase flex items-center gap-xs text-gray-500">
                            <span class="material-symbols-outlined text-[14px]">psychology</span> AI Justification
                        </h4>
                        <p class="text-sm text-on-surface mt-xs font-semibold text-gray-800">${aiJustification.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-sm mt-md">
                        <div class="bg-surface-bright p-sm rounded border border-outline-variant">
                            <span class="text-[10px] text-on-surface-variant uppercase block mb-xs font-bold text-gray-400">Schedule</span>
                            <span class="text-xs text-primary flex items-center gap-xs font-semibold text-gray-600">
                                <span class="material-symbols-outlined text-[16px] text-gray-400">schedule</span> 
                                ${days} (${times})
                            </span>
                        </div>
                        <div class="bg-surface-bright p-sm rounded border border-outline-variant">
                            <span class="text-[10px] text-on-surface-variant uppercase block mb-xs font-bold text-gray-400">Strengths</span>
                            <span class="text-xs text-primary flex items-center gap-xs font-semibold text-gray-600">
                                <span class="material-symbols-outlined text-[16px] text-gray-400">book</span> 
                                ${strongSubjects}
                            </span>
                        </div>
                    </div>
                </div>
            `;
            thread.appendChild(card);
            thread.scrollTop = thread.scrollHeight;
        }

        function renderStudyGroupCard(group) {
            const thread = document.getElementById("chat-thread-container");
            const namesStr = group.members.map(m => m.name).join(", ");
            const avgScore = group.avg_score;
            
            const shared = [];
            if (group.shared_traits.goals && group.shared_traits.goals.length > 0) shared.push(`Goal: ${group.shared_traits.goals[0]}`);
            if (group.shared_traits.study_styles && group.shared_traits.study_styles.length > 0) shared.push(`Style: ${group.shared_traits.study_styles[0]}`);
            if (group.shared_traits.shared_days && group.shared_traits.shared_days.length > 0) shared.push(`Days: ${group.shared_traits.shared_days.join(", ")}`);
            if (group.shared_traits.shared_times && group.shared_traits.shared_times.length > 0) shared.push(`Times: ${group.shared_traits.shared_times.join(", ")}`);
            
            const sharedTraitsStr = shared.length > 0 ? shared.join(" | ") : "Multiple overlapping criteria";

            const card = document.createElement("div");
            card.className = "bg-surface-container border border-outline-variant rounded-xl p-md shadow-sm mb-lg text-on-surface w-full text-left max-w-3xl mt-md flex flex-col gap-sm";
            card.innerHTML = `
                <div class="flex items-center gap-md">
                    <div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-on-secondary shadow-sm">
                        <span class="material-symbols-outlined">diversity_3</span>
                    </div>
                    <div>
                        <h3 class="text-base font-bold text-primary leading-tight">Suggested Study Group (${avgScore}% Avg Match)</h3>
                        <span class="text-xs text-on-surface-variant font-semibold text-gray-500">Optimal group of ${group.members.length} students</span>
                    </div>
                </div>
                <p class="text-sm font-bold text-gray-800 mt-xs">Members: ${namesStr}</p>
                <p class="text-xs text-on-surface-variant italic text-gray-500 font-semibold mb-sm">Shared Traits: ${sharedTraitsStr}</p>
                <div class="mt-auto border-t border-outline-variant/30 pt-sm">
                    <button onclick='createGroupChat(${JSON.stringify(group.members.map(m => m.student_id))}, ${JSON.stringify(group.shared_traits.goals && group.shared_traits.goals.length > 0 ? group.shared_traits.goals[0] + " Study Group" : "Matchmaker Study Group")})' class="w-full bg-secondary text-on-secondary hover:opacity-95 py-2 rounded font-semibold text-xs shadow-sm flex justify-center items-center gap-xs">
                        <span class="material-symbols-outlined text-[16px]">group_add</span> Create Study Group Chat
                    </button>
                </div>
            `;
            thread.appendChild(card);
            thread.scrollTop = thread.scrollHeight;
        }

        async function createGroupChat(studentIds, defaultName) {
            if (!studentIds.includes(loggedInUser.student_id)) {
                studentIds.push(loggedInUser.student_id);
            }
            
            const groupName = defaultName || "Matchmaker Study Group";
            
            try {
                const res = await fetch(window.getApiUrl("/api/chats/create_group"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        student_ids: studentIds,
                        group_name: groupName,
                        creator_id: loggedInUser.student_id,
                        creator_name: loggedInUser.name
                    })
                });
                
                if (res.ok) {
                    alert("Study group chat created successfully! You can find it in your Live Chats dashboard.");
                } else {
                    alert("Failed to create group chat.");
                }
            } catch (e) {
                console.error(e);
                alert("Network error while creating group.");
            }
        }

        function clearChat() {
            chatHistory = [];
            initializeChat();
        }

        function logout() {
            localStorage.removeItem("logged_in_user");
            window.location.href = "/index.html";
        }
    </script>
</body>
</html>
